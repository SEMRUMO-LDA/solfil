<!DOCTYPE html>
<html lang="pt" class="scroll-smooth">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solfil | Materiais de Construção - Algarve</title>
  <meta name="description"
    content="Líder no fornecimento de materiais de construção no Algarve. Qualidade, rigor e marcas de excelência desde 1986.">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            solfil: {
              orange: '#FE5000',
              gray: '#888B8D',
              black: '#111111',
            }
          },
          animation: {
            'spin-slow': 'spin 120s linear infinite',
            'spin-slow-reverse': 'spin 180s linear infinite reverse',
            'float': 'float 20s ease-in-out infinite',
            'pulse-slow': 'pulse 15s ease-in-out infinite',
          },
          keyframes: {
            float: {
              '0%, 100%': { transform: 'translateY(0) scale(1)' },
              '50%': { transform: 'translateY(-30px) scale(1.02)' },
            }
          }
        }
      }
    }
  </script>
  <style>
    :root {
      scroll-behavior: smooth;
    }

    html {
      scroll-padding-top: 96px;
      overflow-x: hidden;
    }

    body {
      font-family: 'Inter', sans-serif;
      font-weight: 400;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }

    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    .slider-full-bleed {
      width: 100vw;
      position: relative;
      left: 50%;
      right: 50%;
      margin-left: -50vw;
      margin-right: -50vw;
      padding-left: max(1.5rem, calc((100vw - 1200px) / 2 + 1.5rem));
      padding-right: 1.5rem;
      display: flex;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
    }
  </style>

  }
}
</script>
</head>
